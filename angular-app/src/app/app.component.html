<h1>Counter App</h1>
<div style="text-align: center;">
  <h3 class="count">{{count}}</h3>
  <div>
    <button (click) = "handleCounter('minus')" class="btn bg-red" >Decrement</button>
    <button class="btn bg-black" (click) = "handleCounter('')">Reset</button>
    <button class="btn bg-green" (click) = "handleCounter('plus')">Increment</button>
  </div>
</div>
