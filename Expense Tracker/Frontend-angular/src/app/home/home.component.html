<div class="mid">
    <!-- <h2>Expense Tracker</h2> -->
    <form action="" #transactionForm="ngForm" (ngSubmit)="addTransaction(transactionForm.value)">


        <label>Title*</label>
        <input type="text" name="title" [ngModel]="selectedTransaction?.title" /><br />
        <label>Amount*</label>
        <input type="number" name="amount" [ngModel]="selectedTransaction?.amount" /><br />
        <label for="currency">Currency* : </label>
        <select name="currency" [ngModel]="selectedTransaction?.currency">
            <option selected value="none">----Select ONE-----</option>
            <option value="INR">INR</option>
            <option value="Dollar">Dollar</option>
            <option value="CanadianDollar">Canadian Dollar</option>
            <option value="Pound">Pound</option>
            <option value="Yen">Yen</option>
        </select>
        <br />
        <br />
        <label>Type*</label>
        <select name="type" [ngModel]="selectedTransaction?.type">
            <option selected value="none">----Select ONE-----</option>
            <option value="income">Income</option>
            <option value="expense">Expense</option>
        </select>
        <br />
        <label for="category">Category* : </label>
        <select name="category" [ngModel]="selectedTransaction?.category">
            <option selected value="none">----Select ONE-----</option>
            <option value="food">Food</option>
            <option value="petrol">Petrol</option>
            <option value="shopping">Shopping</option>
            <option value="bills">Bills</option>
            <option value="others">Others</option>
        </select>
        <br />
        <label for="description">Description : </label>
        <textarea name="description" [ngModel]="selectedTransaction?.description"></textarea>
        <br /><br />
        @if(!selectedTransaction){
            <button class="btn">Add</button>
        }@else{
            <button class="btn">Update</button>
        }
    </form>
    <h3>Summary</h3>
    <p class="totalIncome">Total Income : {{totalIncome}}</p>
    <p class="totalExpense">Total Expense : {{totalExpense}}</p>
    <p class="balance">Balance : {{balance}}</p>
    <button (click)="getSummary()" class="btn">Show Summary</button>
</div>
