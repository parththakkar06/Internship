<div class="mid">
    <!-- <h2>Expense Tracker</h2> -->
    <form action="" [formGroup]="form" (ngSubmit)="onSubmit()">


        <label>Title*</label>
        <input type="text" formControlName="title" /><br />
        <label>Amount*</label>
        <input type="number" formControlName="amount" /><br />
        <label for="currency">Currency* : </label>
        <select formControlName="currency" >
            <option selected value="none">----Select ONE-----</option>
            <option value="INR">INR</option>
            <option value="Dollar">Dollar</option>
            <option value="CanadianDollar">Canadian Dollar</option>
            <option value="Pound">Pound</option>
            <option value="Yen">Yen</option>
        </select>
        <br />
        <br />
        <label>Type*</label>
        <select formControlName="type" >
            <option selected value="none">----Select ONE-----</option>
            <option value="income">Income</option>
            <option value="expense">Expense</option>
        </select>
        <br />
        <label for="category">Category* : </label>
        <select formControlName="category" >
            <option selected value="none">----Select ONE-----</option>
            <option value="food">Food</option>
            <option value="petrol">Petrol</option>
            <option value="shopping">Shopping</option>
            <option value="bills">Bills</option>
            <option value="others">Others</option>
        </select>
        <br />
        <label for="description">Description : </label>
        <textarea formControlName="description" ></textarea>
        <br /><br />
        <button class="btn" type="submit">{{isEditMode ? 'Update' : 'Add'}}</button>
    </form>
    <h3>Summary</h3>
    <p class="totalIncome">Total Income : {{totalIncome}}</p>
    <p class="totalExpense">Total Expense : {{totalExpense}}</p>
    <p class="balance">Balance : {{balance}}</p>
    <button (click)="getSummary()" class="btn">Show Summary</button>
</div>
